enum Department {
  IT_EXPERT
  IT_SPECIALIST
  INFORMATION_PROCESS
  PROGRAMMING
  AI_SYSTEM
  ADVANCED_STUDIES
  INFO_BUSINESS
  INFO_ENGINEERING
  GAME_RESEARCH
  GAME_ENGINEER
  GAME_SOFTWARE
  ESPORTS
  CG_ANIMATION
  DIGITAL_ANIME
  GRAPHIC_DESIGN
  INDUSTRIAL_DESIGN
  ARCHITECTURAL
  SOUND_CREATE
  SOUND_TECHNIQUE
  VOICE_ACTOR
  INTERNATIONAL_COMM
  OTHERS
}

enum Role {
  STUDENT
  ALUMNI
  ADMIN
}

enum UserStatus {
  ENROLLED
  GRADUATED
  WITHDRAWN
}

enum SelectionStepKind {
  DOCUMENT_SCREENING
  WEB_TEST
  ASSIGNMENT
  CODING_TEST
  CASUAL_INTERVIEW
  FIRST_INTERVIEW
  SECOND_INTERVIEW
  FINAL_INTERVIEW
  OFFER
  OTHER
}

enum SelectionFormat {
  ONLINE
  IN_PERSON
  UNKNOWN
}

type User {
  id: ID!
  email: String!
  name: String
  studentId: String
  linkedGmail: String
  role: Role!
  status: UserStatus!
  enrollmentYear: Int
  durationYears: Int
  department: Department
  alumniProfile: AlumniProfile
  createdAt: String!
  updatedAt: String!
}

type AlumniProfile {
  id: ID!
  userId: String!
  nickname: String
  graduationYear: Int!
  department: Department!
  companyNames: [String!]!
  companyExperiences: [CompanyExperience!]!
  remarks: String
  contactEmail: String
  xUrl: String
  instagramUrl: String
  avatarUrl: String
  skills: [String!]!
  portfolioUrl: String
  gakuchika: String
  usefulCoursework: String
  isPublic: Boolean!
  acceptContact: Boolean!
  user: User!
  createdAt: String!
  updatedAt: String!
}

type CompanyExperience {
  id: ID!
  companyName: String!
  isPublic: Boolean!
  selectionExperience: SelectionExperience
}

type SelectionExperience {
  id: ID!
  entryTrigger: String
  overallTip: String
  steps: [SelectionStep!]!
}

type SelectionStep {
  id: ID!
  stepKind: SelectionStepKind!
  format: SelectionFormat!
  interviewerCount: Int
  durationMinutes: Int
  questions: String
  atmosphere: String
  preparation: String
  sortOrder: Int!
}

type AlumniConnection {
  items: [AlumniProfile!]!
  totalCount: Int!
  hasNextPage: Boolean!
}

type AlumniListItem {
  id: ID!
  userId: String!
  nickname: String
  graduationYear: Int!
  department: Department!
  companyNames: [String!]!
  companyExperiences: [AlumniListCompanyExperience!]!
  remarks: String
  xUrl: String
  instagramUrl: String
  avatarUrl: String
  skills: [String!]!
  hasPortfolio: Boolean!
  hasGakuchika: Boolean!
  hasUsefulCoursework: Boolean!
  isPublic: Boolean!
  acceptContact: Boolean!
  createdAt: String!
  updatedAt: String!
}

type AlumniListCompanyExperience {
  id: ID!
  companyName: String!
  isPublic: Boolean!
  selectionExperience: AlumniListSelectionExperience
}

type AlumniListSelectionExperience {
  id: ID!
}

type AlumniListConnection {
  items: [AlumniListItem!]!
  totalCount: Int!
  hasNextPage: Boolean!
}

input UpdateAlumniProfileInput {
  nickname: String
  graduationYear: Int!
  department: Department!
  companyNames: [String!]!
  companyExperiences: [CompanyExperienceInput!]
  remarks: String
  contactEmail: String
  xUrl: String
  instagramUrl: String
  isPublic: Boolean
  acceptContact: Boolean
  skills: [String!]
  portfolioUrl: String
  gakuchika: String
  usefulCoursework: String
}

input CompanyExperienceInput {
  companyName: String!
  isPublic: Boolean
  selectionExperience: SelectionExperienceInput
}

input SelectionExperienceInput {
  entryTrigger: String
  overallTip: String
  steps: [SelectionStepInput!]
}

input SelectionStepInput {
  stepKind: SelectionStepKind!
  format: SelectionFormat
  interviewerCount: Int
  durationMinutes: Int
  questions: String
  atmosphere: String
  preparation: String
}

input InitialSettingsInput {
  name: String!
  studentId: String!
  enrollmentYear: Int!
  durationYears: Int!
  department: Department!
}

input AdminNameInput {
  name: String!
}

extend type Query {
  getAlumniList(
    department: Department
    company: String
    graduationYear: Int
    limit: Int!
    offset: Int!
  ): AlumniConnection!
  getAlumniListItems(
    department: Department
    company: String
    graduationYear: Int
    limit: Int!
    offset: Int!
  ): AlumniListConnection!
  getCompanyNameSuggestions(query: String!, limit: Int): [String!]!
  getMyProfile: User!
  getMyProfileSummary: User!
  getAlumniDetail(id: ID!): AlumniProfile
  findUserByLinkedGmail(gmail: String!): User
  isAdminEmail(email: String!): Boolean!
}

extend type Mutation {
  updateInitialSettings(input: InitialSettingsInput!): User!
  updateAdminName(input: AdminNameInput!): User!
  updateAlumniProfile(input: UpdateAlumniProfileInput!): AlumniProfile!
  updateAvatar(url: String!): AlumniProfile!
  deleteMyAccount: Boolean!
  linkGmail(verificationToken: String!): User!
  unlinkGmail: User!
}
