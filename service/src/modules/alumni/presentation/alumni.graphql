enum Department {
  IT_EXPERT
  IT_SPECIALIST
  INFORMATION_PROCESS
  PROGRAMMING
  AI_SYSTEM
  ADVANCED_STUDIES
  INFO_BUSINESS
  INFO_ENGINEERING
  GAME_RESEARCH
  GAME_ENGINEER
  GAME_SOFTWARE
  ESPORTS
  CG_ANIMATION
  DIGITAL_ANIME
  GRAPHIC_DESIGN
  INDUSTRIAL_DESIGN
  ARCHITECTURAL
  SOUND_CREATE
  SOUND_TECHNIQUE
  VOICE_ACTOR
  INTERNATIONAL_COMM
  OTHERS
}

enum SelectionStepKind {
  DOCUMENT_SCREENING
  WEB_TEST
  ASSIGNMENT
  CODING_TEST
  CASUAL_INTERVIEW
  FIRST_INTERVIEW
  SECOND_INTERVIEW
  FINAL_INTERVIEW
  OFFER
  OTHER
}

enum SelectionFormat {
  ONLINE
  IN_PERSON
  UNKNOWN
}

enum JobHuntingPeriod {
  FIRST_YEAR_FIRST_HALF
  FIRST_YEAR_SECOND_HALF
  SECOND_YEAR_FIRST_HALF
  SUMMER_BREAK
  PRE_GRADUATION_AUTUMN
  OTHER
}

type AlumniProfile {
  id: ID!
  userId: String!
  nickname: String
  graduationYear: Int!
  department: Department!
  companyNames: [String!]!
  companyExperiences: [CompanyExperience!]!
  helpfulReaction: HelpfulReactionSummary!
  remarks: String
  contactEmail: String
  xUrl: String
  instagramUrl: String
  avatarUrl: String
  skills: [String!]!
  portfolioUrl: String
  gakuchika: String
  usefulCoursework: String
  activityPeriod: JobHuntingPeriod
  activityPeriodNote: String
  isPublic: Boolean!
  acceptContact: Boolean!
  user: User!
  createdAt: String!
  updatedAt: String!
}

type CompanyExperience {
  id: ID!
  companyName: String!
  isPublic: Boolean!
  motivation: String
  selectionExperience: SelectionExperience
}

type SelectionExperience {
  id: ID!
  entryTrigger: String
  motivation: String
  activityPeriod: JobHuntingPeriod
  activityPeriodNote: String
  overallTip: String
  steps: [SelectionStep!]!
}

type HelpfulReactionSummary {
  count: Int!
  reactedByViewer: Boolean!
}

type SelectionStep {
  id: ID!
  stepKind: SelectionStepKind!
  format: SelectionFormat!
  interviewerCount: Int
  durationMinutes: Int
  questions: String
  atmosphere: String
  preparation: String
  sortOrder: Int!
}

type AlumniConnection {
  items: [AlumniProfile!]!
  totalCount: Int!
  hasNextPage: Boolean!
}

type AlumniListItem {
  id: ID!
  userId: String!
  nickname: String
  graduationYear: Int!
  department: Department!
  companyNames: [String!]!
  companyExperiences: [AlumniListCompanyExperience!]!
  helpfulReaction: HelpfulReactionSummary!
  remarks: String
  xUrl: String
  instagramUrl: String
  avatarUrl: String
  skills: [String!]!
  hasPortfolio: Boolean!
  hasGakuchika: Boolean!
  hasUsefulCoursework: Boolean!
  isPublic: Boolean!
  acceptContact: Boolean!
  createdAt: String!
  updatedAt: String!
}

type AlumniListCompanyExperience {
  id: ID!
  companyName: String!
  isPublic: Boolean!
  motivation: String
  selectionExperience: AlumniListSelectionExperience
}

type AlumniListSelectionExperience {
  id: ID!
  hasSelectionFlow: Boolean!
}

type AlumniListConnection {
  items: [AlumniListItem!]!
  totalCount: Int!
  hasNextPage: Boolean!
}

input UpdateAlumniProfileInput {
  nickname: String
  graduationYear: Int!
  department: Department!
  companyNames: [String!]!
  companyExperiences: [CompanyExperienceInput!]
  remarks: String
  contactEmail: String
  xUrl: String
  instagramUrl: String
  isPublic: Boolean
  acceptContact: Boolean
  skills: [String!]
  portfolioUrl: String
  gakuchika: String
  usefulCoursework: String
  activityPeriod: JobHuntingPeriod
  activityPeriodNote: String
}

input CompanyExperienceInput {
  companyName: String!
  isPublic: Boolean
  motivation: String
  selectionExperience: SelectionExperienceInput
}

input SelectionExperienceInput {
  entryTrigger: String
  motivation: String
  activityPeriod: JobHuntingPeriod
  activityPeriodNote: String
  overallTip: String
  steps: [SelectionStepInput!]
}

input SelectionStepInput {
  stepKind: SelectionStepKind!
  format: SelectionFormat
  interviewerCount: Int
  durationMinutes: Int
  questions: String
  atmosphere: String
  preparation: String
}

extend type Query {
  getAlumniList(
    department: Department
    company: String
    graduationYear: Int
    limit: Int!
    offset: Int!
  ): AlumniConnection!
  getAlumniListItems(
    department: Department
    company: String
    graduationYear: Int
    limit: Int!
    offset: Int!
  ): AlumniListConnection!
  getCompanyNameSuggestions(query: String!, limit: Int): [String!]!
  getAlumniDetail(id: ID!): AlumniProfile
}

extend type Mutation {
  updateAlumniProfile(input: UpdateAlumniProfileInput!): AlumniProfile!
  toggleHelpfulReaction(alumniProfileId: ID!): AlumniProfile!
  updateAvatar(url: String!): AlumniProfile!
}
