name: CI

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    check:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup mise
              uses: jdx/mise-action@v4

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Format check
              run: pnpm format:check

            - name: Lint check
              run: pnpm lint:check

            - name: Type check
              run: pnpm typecheck

            - name: Build
              run: pnpm build
