query GetAlumniList(
  $department: Department
  $company: String
  $graduationYear: Int
  $sort: AlumniListSort
  $limit: Int!
  $offset: Int!
) {
  getAlumniList(
    department: $department
    company: $company
    graduationYear: $graduationYear
    sort: $sort
    limit: $limit
    offset: $offset
  ) {
    items {
      id
      userId
      nickname
      graduationYear
      department
      companyNames
      activityPeriod
      activityPeriodNote
      companyExperiences {
        id
        companyName
        isPublic
        motivation
        selectionExperience {
          id
          entryTrigger
          motivation
          activityPeriod
          activityPeriodNote
          overallTip
          steps {
            id
            stepKind
            format
            interviewerCount
            durationMinutes
            questions
            atmosphere
            preparation
            sortOrder
          }
        }
      }
      helpfulReaction {
        count
        reactedByViewer
      }
      remarks
      contactEmail
      xUrl
      instagramUrl
      isPublic
      acceptContact
      avatarUrl
      skills
      portfolioUrl
      gakuchika
      usefulCoursework
      createdAt
      updatedAt
    }
    totalCount
    hasNextPage
  }
}
